# HAICD 意义评估权重配置模板
# Human-AI Interaction Contextual Dynamics Model
# Meaning Evaluation Weights Template
#
# 作者：Jeason (理论创建者)
# 实现：智联星核 (ZLXH)
# 许可：CC BY-NC-SA 4.0
#
# 使用说明：
# 1. 复制此模板创建场景特定配置文件
# 2. 调整权重值（总和应为 1.0）
# 3. 在评分系统中加载使用

# ==================== 默认权重 ====================
default:
  description: "默认权重配置 - 通用场景"
  weights:
    user_value: 0.4          # 用户价值：对用户当前任务是否有帮助
    cognitive_contribution: 0.3  # 认知贡献：是否增进理解或启发思考
    risk_controlled: 0.2     # 风险可控：潜在风险是否被标注和管理
    ethical_compliance: 0.1  # 伦理合规：是否符合伦理和规范
  
  thresholds:
    meaningful: 0.7          # 有意义阈值
    conditional: 0.4         # 有条件使用阈值

# ==================== 场景配置 ====================

scenarios:
  # --- 医学科研场景 ---
  medical_research:
    description: "医学科研工作 - 研究假设生成阶段"
    user_role: "医学科研工作者"
    scenario_type: "innovation"
    task_phase: "hypothesis"
    risk_level: "high"
    
    weights:
      user_value: 0.3
      cognitive_contribution: 0.4  # 认知贡献权重最高
      risk_controlled: 0.2
      ethical_compliance: 0.1
    
    preferred_states:
      - 高风险创新
      - 未来导向型输出
      - 概念探索
    
    avoided_states:
      - 幻觉  # 除非明确标注为思想实验
      - 流程混乱但输出有效
    
    notes: "科研探索需要启发性，但医学领域风险敏感，需标注不确定性"

  # --- 医学软件场景 ---
  medical_software:
    description: "医学软件开发 - 合规性设计"
    user_role: "医学软件专家"
    scenario_type: "routine"
    task_phase: "implementation"
    risk_level: "high"
    
    weights:
      user_value: 0.4
      cognitive_contribution: 0.2  # 认知贡献权重较低
      risk_controlled: 0.3         # 风险可控权重最高
      ethical_compliance: 0.1
    
    preferred_states:
      - 顺应
      - 经验驱动型
      - 资源受限下的保守输出
    
    avoided_states:
      - 高风险创新
      - 幻觉
      - 创新性错误
    
    notes: "软件合规性要求准确性优先，避免创新性输出"

  # --- 医学教学场景 ---
  medical_teaching:
    description: "医学院校教学 - 案例设计"
    user_role: "医学院校老师"
    scenario_type: "teaching"
    task_phase: "design"
    risk_level: "medium"
    
    weights:
      user_value: 0.4
      cognitive_contribution: 0.3
      risk_controlled: 0.1
      ethical_compliance: 0.2
    
    preferred_states:
      - 顺应
      - 启发型理想主义输出
      - 探索性思考
    
    allowed_with_label:
      - 幻觉  # 作为思想实验标注
      - 高风险创新
    
    notes: "教学需要启发性，允许一定虚构但需标注"

  # --- 思想实验场景 ---
  thought_experiment:
    description: "伦理/哲学思想实验"
    user_role: "研究者"
    scenario_type: "thought_experiment"
    task_phase: "exploration"
    risk_level: "low"
    
    weights:
      user_value: 0.3
      cognitive_contribution: 0.5  # 认知贡献权重最高
      risk_controlled: 0.1
      ethical_compliance: 0.1
    
    preferred_states:
      - 幻觉  # 思想实验中有价值
      - 概念探索
      - 高风险创新
      - 未来导向型输出
    
    notes: "思想实验允许虚构前提，重点在启发性和逻辑自洽"

  # --- 紧急响应场景 ---
  emergency_response:
    description: "紧急决策/快速响应"
    user_role: "决策者"
    scenario_type: "emergency"
    task_phase: "action"
    risk_level: "high"
    
    weights:
      user_value: 0.5          # 用户价值权重最高
      cognitive_contribution: 0.2
      risk_controlled: 0.2
      ethical_compliance: 0.1
    
    preferred_states:
      - 流程混乱但输出有效
      - 资源受限下的保守输出
      - 实践验证型
    
    notes: "紧急情况下结果可用性优先于过程完美"

  # --- 创意头脑风暴 ---
  brainstorming:
    description: "创意生成/头脑风暴"
    user_role: "创意工作者"
    scenario_type: "creative"
    task_phase: "ideation"
    risk_level: "low"
    
    weights:
      user_value: 0.3
      cognitive_contribution: 0.4
      risk_controlled: 0.1
      ethical_compliance: 0.2
    
    preferred_states:
      - 高风险创新
      - 创新性错误
      - 概念探索
      - 探索性思考
    
    notes: "创意场景鼓励非常规思维，容忍错误"

# ==================== 用户角色预设 ====================

user_roles:
  researcher:
    description: "科研工作者"
    default_scenario: "medical_research"
    innovation_tolerance: "high"
    accuracy_requirement: "high"
  
  engineer:
    description: "工程师/开发者"
    default_scenario: "medical_software"
    innovation_tolerance: "low"
    accuracy_requirement: "very_high"
  
  teacher:
    description: "教师/教育者"
    default_scenario: "medical_teaching"
    innovation_tolerance: "medium"
    accuracy_requirement: "medium"
  
  student:
    description: "学生/学习者"
    default_scenario: "medical_teaching"
    innovation_tolerance: "medium"
    accuracy_requirement: "high"
  
  decision_maker:
    description: "决策者/管理者"
    default_scenario: "emergency_response"
    innovation_tolerance: "low"
    accuracy_requirement: "high"

# ==================== 状态流跟踪配置 ====================

state_flow:
  # 状态流跟踪参数
  tracking_enabled: true
  
  # 状态切换频率限制
  switch_threshold:
    min_steps_between_switches: 2  # 最少间隔步数
    max_switches_per_session: 10   # 单会话最大切换次数
  
  # 状态持续时间统计
  duration_tracking:
    enabled: true
    report_interval: 5  # 每 5 步报告一次
  
  # 异常检测
  anomaly_detection:
    enabled: true
    # 频繁切换检测
    frequent_switch_threshold: 5  # 5 步内切换超过 3 次告警
    # 停滞检测
    stagnation_threshold: 10  # 10 步未切换告警

# ==================== 评估报告配置 ====================

reporting:
  # 报告生成
  enabled: true
  
  # 报告内容
  include:
    - state_distribution      # 状态分布
    - score_statistics        # 评分统计
    - transition_analysis     # 迁移分析
    - recommendations         # 改进建议
  
  # 报告格式
  format: "json"  # json / yaml / markdown
  
  # 报告输出路径
  output_path: "./reports/"

